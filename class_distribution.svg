<svg viewBox="0 0 500 300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bar { fill: #007bff; }
    .text { font-family: sans-serif; font-size: 12px; fill: #333; }
    .label { font-family: sans-serif; font-size: 14px; font-weight: bold; fill: #000; }
    .axis { stroke: #666; stroke-width: 1; }
  </style>
  
  <text x="250" y="25" class="label" text-anchor="middle">Class Distribution (Training Data)</text>
  
  <!-- Y-Axis -->
  <line x1="50" y1="50" x2="50" y2="250" class="axis" />
  <text x="40" y="55" class="text" text-anchor="end">45%</text>
  <text x="40" y="150" class="text" text-anchor="end">22%</text>
  <text x="40" y="245" class="text" text-anchor="end">0%</text>

  <!-- X-Axis -->
  <line x1="50" y1="250" x2="450" y2="250" class="axis" />
  
  <!-- Bar 0 (42.1%) -->
  <rect x="70" y="63" width="40" height="187" class="bar" />
  <text x="90" y="265" class="text" text-anchor="middle">L0</text>
  <text x="90" y="60" class="text" text-anchor="middle">42.1%</text>

  <!-- Bar 1 (42.6%) -->
  <rect x="130" y="61" width="40" height="189" class="bar" />
  <text x="150" y="265" class="text" text-anchor="middle">L1</text>
  <text x="150" y="58" class="text" text-anchor="middle">42.6%</text>

  <!-- Bar 2 (3.2%) -->
  <rect x="190" y="236" width="40" height="14" class="bar" style="fill: #dc3545;" />
  <text x="210" y="265" class="text" text-anchor="middle">L2</text>
  <text x="210" y="233" class="text" text-anchor="middle">3.2%</text>

  <!-- Bar 3 (6.0%) -->
  <rect x="250" y="223" width="40" height="27" class="bar" style="fill: #dc3545;" />
  <text x="270" y="265" class="text" text-anchor="middle">L3</text>
  <text x="270" y="220" class="text" text-anchor="middle">6.0%</text>

  <!-- Bar 4 (1.3%) -->
  <rect x="310" y="244" width="40" height="6" class="bar" style="fill: #dc3545;" />
  <text x="330" y="265" class="text" text-anchor="middle">L4</text>
  <text x="330" y="241" class="text" text-anchor="middle">1.3%</text>

  <!-- Bar 5 (4.8%) -->
  <rect x="370" y="229" width="40" height="21" class="bar" style="fill: #dc3545;" />
  <text x="390" y="265" class="text" text-anchor="middle">L5</text>
  <text x="390" y="226" class="text" text-anchor="middle">4.8%</text>

  <text x="250" y="290" class="text" text-anchor="middle" font-style="italic">L0 &amp; L1 dominate the dataset, accounting for ~85% of samples.</text>
</svg>
